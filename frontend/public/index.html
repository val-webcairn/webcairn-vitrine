<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="WebCairn - Portfolio de Lilian Valette, créateur de sites web en région PACA." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="canonical" href="https://webcairn.fr/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Réseaux sociaux -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webcairn.fr/" />
    <meta property="og:title" content="WebCairn | Création de Sites Vitrines" />
    <meta property="og:description"
        content="Je conçois et développe des sites vitrines sur mesure pour artisans et restaurateurs en région PACA." />
    <meta property="og:image" content="https://webcairn.fr/og-image.jpg" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="WebCairn | Création de Sites Vitrines" />
    <meta property="twitter:description"
        content="Je conçois et développe des sites vitrines sur mesure pour artisans et restaurateurs en région PACA." />
    <meta property="twitter:image" content="https://webcairn.fr/og-image.jpg" />
    <title>WebCairn | Création de Sites Vitrines</title>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Hidden form for Netlify Forms -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="text" name="activity" />
        <textarea name="message"></textarea>
    </form>
</body>

</html>
