name: Production CSS Minify

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-minify-css:
    name: Build Production + Minify CSS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        env:
          NODE_ENV: production
        run: npm run build

      - name: Minify generated CSS files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/assets/*.css)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No CSS files found in dist/assets"
            exit 1
          fi

          echo "CSS files before minification:"
          for file in "${files[@]}"; do
            bytes=$(wc -c < "$file")
            echo "- $file: ${bytes} bytes"
          done

          for file in "${files[@]}"; do
            npx --yes clean-css-cli@5 -O2 "$file" -o "$file"
          done

          echo "CSS files after minification:"
          for file in "${files[@]}"; do
            bytes=$(wc -c < "$file")
            gzip_bytes=$(gzip -c "$file" | wc -c)
            echo "- $file: ${bytes} bytes (gzip: ${gzip_bytes} bytes)"
          done

      - name: Upload production artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-minified-css
          path: frontend/dist
          if-no-files-found: error
